<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"> 
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html"> 

<h:head>
    <title>Index Page</title>
    <style>
        body {
            background-image: url('resources/backgroundhome.jpg'); /* Replace 'backgroundhome.jpg' with the path to your image */
            background-size: cover;
            font-family: Arial, sans-serif;
            margin: 0;
            color: white;
        }
        .navbar {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .navbar h1 {
            margin: 0;
            font-size: 24px;
            color: white;
        }
        .navbar a {
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .navbar a:hover {
            background-color: #45a049;
        }
    </style>
</h:head> 
<body>
    <div class="navbar">
        <h1>The Tender Management System</h1>
        <h:form>
            <h:commandLink action="index" value="Home" />
            <h:commandLink action="login" value="Admin Login" />
            <h:commandLink action="companylogin" value="company Login" />
            <h:commandLink action="comreg" value="company Registration" />
        </h:form>
    </div>
</body>
</html>
